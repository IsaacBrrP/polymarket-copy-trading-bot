services:
  polymarket-copy-bot:
    build: .
    restart: unless-stopped
    ports:
      - "${STATUS_PORT:-3001}:${STATUS_PORT:-3001}"
    environment:
      - USER_ADDRESSES=${USER_ADDRESSES}
      - PROXY_WALLET=${PROXY_WALLET}
      - PRIVATE_KEY=${PRIVATE_KEY}
      - RPC_URL=${RPC_URL}
      - FETCH_INTERVAL=${FETCH_INTERVAL:-1}
      - TRADE_MULTIPLIER=${TRADE_MULTIPLIER:-1.0}
      - RETRY_LIMIT=${RETRY_LIMIT:-3}
      - TRADE_AGGREGATION_ENABLED=${TRADE_AGGREGATION_ENABLED:-false}
      - TRADE_AGGREGATION_WINDOW_SECONDS=${TRADE_AGGREGATION_WINDOW_SECONDS:-300}
      - STATUS_PORT=${STATUS_PORT:-3001}
      - STATUS_ENABLED=${STATUS_ENABLED:-true}
      - POLYMARKET_SPENDER=${POLYMARKET_SPENDER:-0x4bFb41d5B3570DeFd03C39a9A4d8de6bd8B8982E}


